# Default lovable MCP configuration
# Update fields below for your environment.
name: lovable-mcp
enabled: true
version: 1

settings:
  mode: "friendly"   # friendly | strict
  default_timeout_seconds: 10
  max_concurrent: 3
  rules:
    - id: registration
      enabled: true
      selector: "#register-form"
      validation: true
      notify_admin: true

paths:
  include:
    - "prototype/**"
    - "src/**"
  exclude:
    - "dist/**"
    - ".git/**"

api:
  endpoint: "https://api.lovable.example/mcp"
  api_key: "REPLACE_WITH_YOUR_API_KEY"

logging:
  level: info   # debug | info | warn | error
  file: logs/lovable-mcp.log

notes: |
  - This is a starter config for "lovable mcp" integration.
  - Rename or move this file if your tool expects a different path or filename.
  - If your tool requires JSON, I can convert this to `lovable-mcp.json` or a dotfile (e.g. `.lovablerc`).

<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>v0 MCP Demo</title>
  <style>
    body{font-family:Segoe UI,Helvetica,Arial,sans-serif;padding:24px;background:#f7fbfb}
    .card{background:#fff;padding:16px;border-radius:8px;box-shadow:0 6px 18px rgba(0,0,0,.06)}
    ul{list-style:none;padding:0}
    li{padding:8px 0;border-bottom:1px solid #eee}
    header{display:flex;align-items:center;justify-content:space-between}
    .endpoint{color:#2b7a78}
  </style>
</head>
<body>
  <header>
    <h1>v0 MCP Demo</h1>
    <div id="endpoint" class="endpoint">Loading...</div>
  </header>
  <main>
    <section class="card">
      <h2>Available Servers</h2>
      <ul id="servers"></ul>
    </section>
  </main>
  <script>
    async function load() {
      const res = await fetch('/api/servers');
      const json = await res.json();
      document.getElementById('endpoint').textContent = json.source === 'config' ? json.endpoint : '(demo)';
      const ul = document.getElementById('servers');
      ul.innerHTML = '';
      json.servers.forEach(s => {
        const li = document.createElement('li');
        li.innerHTML = `<strong>${s.name}</strong> — <a href="${s.url}" target="_blank">${s.url}</a>`;
        ul.appendChild(li);
      });
    }
    load();
  </script>
</body>
</html>
